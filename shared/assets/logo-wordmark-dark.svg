<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 64" fill="none" aria-labelledby="wordmarkTitle wordmarkDesc" role="img">
  <title id="wordmarkTitle">Create Awesome Node App</title>
  <desc id="wordmarkDesc">CNA wordmark combining a cozy node nest mark with the project name on a dark background.</desc>
  <defs>
    <linearGradient id="cnaNestWordDark" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="cnaAccentWordDark" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- Mark -->
  <g transform="translate(0 0)">
    <path
      d="M32 10c-1.6 0-3.1.8-4 2.1l-11 17.6c-1.8 2.9-.3 6.7 3 7.5V46c0 3.3 2.7 6 6 6h12c3.3 0 6-2.7 6-6V37.2c3.3-.8 4.8-4.6 3-7.5L36 12.1C35.1 10.8 33.6 10 32 10Z"
      stroke="url(#cnaNestWordDark)"
      stroke-width="5"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <circle cx="32" cy="27" r="5" fill="url(#cnaAccentWordDark)"/>
    <circle cx="20" cy="43" r="5" fill="#14b8a6"/>
    <circle cx="44" cy="43" r="5" fill="#f59e0b"/>
  </g>

  <!-- Text -->
  <g transform="translate(80 14)" aria-hidden="true">
    <text x="0" y="30" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="800" letter-spacing="-0.5">
      Create Awesome
    </text>
    <text x="0" y="30" fill="url(#cnaNestWordDark)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="800" letter-spacing="-0.5">
      <tspan dx="190">Node App</tspan>
    </text>
  </g>
</svg>
