service: ${env:SERVICE_NAME, 'nestjs-serverless'}

frameworkVersion: '4'

plugins:
  - serverless-esbuild
  - serverless-offline

useDotenv: true

package:
  individually: true
  excludeDevDependencies: true

custom:
  serverless-offline:
    httpPort: 3000
    port: 3000
    noPrependStageInUrl: true
    reloadHandler: true
  esbuild:
    sourcemap: true
    minify: false
    target: node18
    platform: node
    bundle: true
    external:
      - "aws-sdk"
      - "@nestjs/microservices"
      - "@nestjs/microservices/microservices-module"
      - "@nestjs/websockets/socket-module"
      - "cache-manager"
      - "class-transformer/storage"
      - "@apollo/federation"
      - "@apollo/subgraph"
      - "@apollo/subgraph/dist/directives"
      - "apollo-server-fastify"

provider:
  name: aws
  stage: local
  runtime: nodejs18.x
  deploymentBucket:
    blockPublicAccess: true
    versioning: true
    serverSideEncryption: AES256

functions:
  main:
    handler: src/lambda.handler
    events:
      - http:
          method: ANY
          path: /
      - http:
          method: ANY
          path: '{proxy+}'
