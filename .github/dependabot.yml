version: 2
updates:
  # Template roots ship deps via package/index.js (no package.json on disk).
  # Only scan extension manifests and the SaaS danger tooling package.
  - package-ecosystem: npm
    directories:
      - /extensions/*
      - /templates/nextjs-saas-ai-starter/tools/danger
    schedule:
      interval: weekly
    ignore:
      # Prisma 7 needs schema/config migration in nextjs-prisma.
      - dependency-name: prisma
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]
    groups:
      devDependencies:
        dependency-type: development
      productionDependencies:
        dependency-type: production

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
