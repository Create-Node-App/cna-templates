name: Test Template and Extension Combinations

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - 'templates.json'
      - 'extensions/**'
      - '.github/workflows/test-combinations.yml'
    types:
      - opened
      - synchronize
      - reopened
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate-combinations:
    name: Generate test combinations
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Generate random combinations
        id: set-matrix
        run: |
          node <<EOF
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('./templates.json', 'utf8'));
          const repoDir = process.cwd();

          const templates = data.templates.map(t => ({
            slug: t.slug,
            type: t.type,
            localUrl: \`file://${repoDir}?subdir=templates/\${t.slug.replace(/-boilerplate$|-starter$/, '') + '-starter'}\`,
          }));
          const extensions = data.extensions;

          const extLocalUrl = (ext) => {
            const match = ext.url.match(/\/extensions\/([^/]+)(?:\/|$)/);
            const dir = match ? match[1] : null;
            return dir ? \`file://${repoDir}?subdir=extensions/${dir}\` : null;
          };

          const hasIncompatibility = (selected, candidate) => {
            const candidateSlugs = new Set([candidate.slug]);
            const selectedSlugs = new Set(selected.map(e => e.slug));
            for (const ext of selected) {
              const incompatible = ext.incompatibleWith || [];
              if (incompatible.some(s => candidateSlugs.has(s))) return true;
              const candidateIncompatible = candidate.incompatibleWith || [];
              if (candidateIncompatible.some(s => selectedSlugs.has(s))) return true;
            }
            return false;
          };

          const randomCombinations = data.templates.map(template => {
            const compatibleExtensions = extensions.filter(ext => {
              const extTypes = Array.isArray(ext.type) ? ext.type : [ext.type];
              return extTypes.includes(template.type);
            });

            const categories = [...new Set(compatibleExtensions.map(e => e.category))];
            const selectedExtensions = [];
            for (const category of categories) {
              const categoryExtensions = compatibleExtensions.filter(e => e.category === category);
              const available = categoryExtensions.filter(e => !hasIncompatibility(selectedExtensions, e));
              if (available.length === 0) continue;
              const ext = available[Math.floor(Math.random() * available.length)];
              if (ext) selectedExtensions.push(ext);
            }

            const tplMatch = template.url.match(/\/templates\/([^/]+)(?:\/|$)/);
            const tplDir = tplMatch ? tplMatch[1] : null;
            const templateUrl = tplDir ? \`file://${repoDir}?subdir=templates/${tplDir}\` : template.slug;

            return { template: template.slug, templateUrl, extensions: selectedExtensions.map(extLocalUrl).filter(Boolean) };
          });

          const matrix = JSON.stringify(randomCombinations);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'matrix=' + matrix + '\n');
          EOF

  test-combinations:
    name: Test ${{ matrix.combination.template }}
    needs: generate-combinations
    strategy:
      fail-fast: false
      matrix:
        combination: ${{ fromJson(needs.generate-combinations.outputs.matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Run tests for combination
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          echo "Testing template: ${{ matrix.combination.template }}"
          echo "Template URL: ${{ matrix.combination.templateUrl }}"
          echo "With extensions: ${{ join(matrix.combination.extensions, ' ') }}"

          ADDONS="${{ join(matrix.combination.extensions, ' ') }}"
          ADDONS_FLAG=""
          if [ -n "$ADDONS" ]; then
            ADDONS_FLAG="--addons $ADDONS"
          fi

          CI=true npx create-awesome-node-app my-project \
            -t "${{ matrix.combination.templateUrl }}" \
            $ADDONS_FLAG

          cd my-project

          npm install
          npm run format --if-present
          npm run lint:fix --if-present
          npm run lint --if-present
          npm run type-check --if-present
          SKIP_ENV_VALIDATION=true npm run build --if-present

          tree -I 'node_modules|dist|.git'

  generate-full-matrix:
    name: Generate full test matrix
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Generate full combinations matrix
        id: set-matrix
        run: |
          node <<EOF
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('./templates.json', 'utf8'));
          const repoDir = process.cwd();

          const extensions = data.extensions;

          const extLocalUrl = (ext) => {
            const match = ext.url.match(/\/extensions\/([^/]+)(?:\/|$)/);
            const dir = match ? match[1] : null;
            return dir ? \`file://${repoDir}?subdir=extensions/\${dir}\` : null;
          };

          const hasIncompatibility = (selected, candidate) => {
            const candidateSlugs = new Set([candidate.slug]);
            const selectedSlugs = new Set(selected.map(e => e.slug));
            for (const ext of selected) {
              const incompatible = ext.incompatibleWith || [];
              if (incompatible.some(s => candidateSlugs.has(s))) return true;
              const candidateIncompatible = candidate.incompatibleWith || [];
              if (candidateIncompatible.some(s => selectedSlugs.has(s))) return true;
            }
            return false;
          };

          const combinations = [];

          for (const template of data.templates) {
            const compatibleExtensions = extensions.filter(ext => {
              const extTypes = Array.isArray(ext.type) ? ext.type : [ext.type];
              return extTypes.includes(template.type);
            });

            const selectedExtensions = [];
            for (const ext of compatibleExtensions) {
              if (!hasIncompatibility(selectedExtensions, ext)) {
                selectedExtensions.push(ext);
              }
            }

            if (selectedExtensions.length > 0) {
              const extUrls = selectedExtensions.map(ext => extLocalUrl(ext)).filter(Boolean);

              const tplMatch = template.url.match(/\/templates\/([^/]+)(?:\/|$)/);
              const tplDir = tplMatch ? tplMatch[1] : null;
              const templateUrl = tplDir ? \`file://${repoDir}?subdir=templates/${tplDir}\` : template.slug;

              combinations.push({
                template: template.slug,
                templateUrl,
                extensions: extUrls
              });
            }
          }

          const matrix = JSON.stringify(combinations);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'matrix=' + matrix + '\n');
          console.log('Generated ' + combinations.length + ' full combinations');
          EOF

  test-full-matrix:
    name: Full ${{ matrix.combination.template }}
    needs: generate-full-matrix
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        combination: ${{ fromJson(needs.generate-full-matrix.outputs.matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Run full test
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          echo "Testing: ${{ matrix.combination.template }}"
          echo "With ALL extensions: ${{ join(matrix.combination.extensions, ' ') }}"

          ADDONS="${{ join(matrix.combination.extensions, ' ') }}"
          ADDONS_FLAG=""
          if [ -n "$ADDONS" ]; then
            ADDONS_FLAG="--addons $ADDONS"
          fi

          CI=true npx create-awesome-node-app my-project \
            -t "${{ matrix.combination.templateUrl }}" \
            $ADDONS_FLAG

          cd my-project
          npm install
          npm run format --if-present
          npm run lint:fix --if-present
          npm run lint --if-present
          npm run type-check --if-present
          SKIP_ENV_VALIDATION=true npm run build --if-present
