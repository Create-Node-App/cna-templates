name: Landing Visual Regression

on:
  pull_request:
    branches:
      - main
    paths:
      - 'shared/assets/**'
      - 'templates/**/Landing*'
      - 'templates/**/landing*'
      - 'templates/**/page.module.css'
      - 'templates/**/index.astro'
      - 'templates/**/Newtab.*'
      - 'templates/**/Popup.*'
      - 'scripts/landing-visual/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  visual:
    name: Visual regression on ${{ matrix.template }}
    strategy:
      fail-fast: false
      matrix:
        template:
          - react-vite-starter
          - nextjs-starter
          - remix-starter
          - astro-starter
          - webextension-react-vite-starter
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install Playwright
        working-directory: scripts/landing-visual
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Scaffold test project
        id: scaffold
        continue-on-error: true
        run: |
          CI=true npx create-awesome-node-app visual-test-project \
            -t "file://${PWD}?subdir=templates/${{ matrix.template }}"
          echo "Project scaffolded"

      - name: Start dev server
        if: steps.scaffold.outcome == 'success'
        working-directory: visual-test-project
        run: |
          npm install
          PORT=${{ matrix.template == 'nextjs-starter' && '3000' || matrix.template == 'astro-starter' && '4321' || '5173' }}
          npm run dev -- --host 0.0.0.0 --port "$PORT" &
          echo "Waiting for dev server on port $PORT..."
          for i in $(seq 1 30); do
            curl -sf "http://localhost:$PORT" > /dev/null 2>&1 && echo "Server ready on port $PORT" && break
            sleep 1
          done
          echo "Dev server started (or timeout)"

      - name: Run visual tests
        if: steps.scaffold.outcome == 'success'
        working-directory: scripts/landing-visual
        run: |
          npx playwright test --project=chromium
        env:
          PORT: ${{ matrix.template == 'nextjs-starter' && '3000' || matrix.template == 'astro-starter' && '4321' || '5173' }}
          BASE_URL: http://localhost:${{ matrix.template == 'nextjs-starter' && '3000' || matrix.template == 'astro-starter' && '4321' || '5173' }}

      - name: Upload screenshots (always)
        if: always() && steps.scaffold.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.template }}
          path: |
            scripts/landing-visual/test-results/
            scripts/landing-visual/__screenshots__/
