name: CI Templates (L1)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    name: Generate template matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      count: ${{ steps.set.outputs.count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Generate L1 matrix
        id: set
        run: node scripts/ci/generate-matrix.js --layer templates

  templates:
    name: ${{ matrix.cell.id }}
    needs: generate
    if: needs.generate.outputs.count != '0'
    strategy:
      fail-fast: false
      matrix:
        cell: ${{ fromJson(needs.generate.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Scaffold check (template alone)
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          EXTRA=()
          # Turborepo needs an explicit scope for non-interactive scaffolds.
          if [ "${{ matrix.cell.templateDir }}" = "turborepo-starter" ]; then
            EXTRA+=(--set "scope=@app/" --set "projectName=turbo-app")
          fi
          # WDIO browser tests are not reliable without a dedicated runner image.
          if [ "${{ matrix.cell.templateDir }}" = "wdio-starter" ]; then
            EXTRA+=(--skip-test)
          fi
          # SaaS: service-backed tests/build; L1 covers install + type-check.
          if [ "${{ matrix.cell.templateDir }}" = "nextjs-saas-ai-starter" ]; then
            EXTRA+=(--skip-test --skip-build)
          fi
          node scripts/ci/run-scaffold-check.js \
            --template-url "${{ matrix.cell.templateUrl }}" \
            --workdir "${{ runner.temp }}/cna-l1" \
            "${EXTRA[@]}"
