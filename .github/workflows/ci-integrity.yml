name: CI Integrity (L0)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integrity:
    name: Registry + docs + assets + profiles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Validate templates.json (incl. on-disk paths)
        run: node scripts/validate-templates.js

      - name: Check landing/README doc links
        run: node scripts/check-template-integrity.js

      - name: Check shared assets sync
        run: node scripts/sync-shared-assets.js --check

      - name: Validate curated CI profiles
        run: node scripts/ci/generate-matrix.js --layer validate-profiles
