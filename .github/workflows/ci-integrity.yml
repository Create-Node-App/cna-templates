name: CI Integrity (L0)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integrity:
    name: Registry + docs + assets + profiles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Validate templates.json (incl. on-disk paths)
        run: node scripts/validate-templates.js

      - name: Check landing/README doc links
        run: node scripts/check-template-integrity.js

      - name: Check shared assets sync
        run: node scripts/sync-shared-assets.js --check

      - name: Validate curated CI profiles
        run: node scripts/ci/generate-matrix.js --layer validate-profiles
