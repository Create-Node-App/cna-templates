name: Smoke Test

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    name: Smoke test scaffolded projects
    strategy:
      fail-fast: false
      matrix:
        include:
          - template: nextjs-starter
            addons: ""
          - template: nestjs-boilerplate
            addons: ""
          - template: react-vite-boilerplate
            addons: '--addons "file://${PWD}?subdir=extensions/react-material-ui" "file://${PWD}?subdir=extensions/react-zustand"'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Scaffold project
        run: |
          CI=true npx create-awesome-node-app smoke-test-project \
            -t "file://${PWD}?subdir=templates/${{ matrix.template }}" \
            ${{ matrix.addons }}
          echo "Project scaffolded successfully"

      - name: Run basic checks
        working-directory: smoke-test-project
        run: |
          npm install
          npm run format --if-present
          npm run lint:fix --if-present
          npm run lint --if-present
          npm run type-check --if-present
          SKIP_ENV_VALIDATION=true npm run build --if-present
          echo "Smoke test passed for ${{ matrix.template }}"
