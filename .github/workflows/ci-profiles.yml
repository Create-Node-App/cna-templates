name: CI Profiles (L3)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    name: Generate profile matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      count: ${{ steps.set.outputs.count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Generate L3 matrix
        id: set
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
            node scripts/ci/generate-matrix.js --layer profiles --changed-only --base-ref "$BASE"
          else
            node scripts/ci/generate-matrix.js --layer profiles
          fi

  profiles:
    name: ${{ matrix.cell.id }}
    needs: generate
    if: needs.generate.outputs.count != '0'
    strategy:
      fail-fast: false
      matrix:
        cell: ${{ fromJson(needs.generate.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Scaffold check (curated profile)
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          PROFILE_SETS: ${{ toJson(matrix.cell.sets) }}
        run: |
          EXTRA=()
          # WDIO browser tests are not reliable without a dedicated runner image.
          if [ "${{ matrix.cell.templateDir }}" = "wdio-starter" ]; then
            EXTRA+=(--skip-test)
          fi
          # SaaS: service-backed tests/build; canonical run covers install + type-check.
          if [ "${{ matrix.cell.templateDir }}" = "nextjs-saas-ai-starter" ]; then
            EXTRA+=(--skip-test --skip-build)
          fi
          # Expand optional --set flags from profile.sets JSON
          while IFS= read -r line; do
            [ -n "$line" ] && EXTRA+=(--set "$line")
          done < <(node -e 'const s=JSON.parse(process.env.PROFILE_SETS||"{}"); for (const [k,v] of Object.entries(s)) console.log(k+"="+v)')

          ADDON_ARGS=()
          for url in ${{ join(matrix.cell.addons, ' ') }}; do
            ADDON_ARGS+=(--addon-url "$url")
          done
          node scripts/ci/run-scaffold-check.js \
            --template-url "${{ matrix.cell.templateUrl }}" \
            --workdir "${{ runner.temp }}/cna-l3" \
            "${ADDON_ARGS[@]}" \
            "${EXTRA[@]}"
